name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - 'readiness/**'
      - 'feature/gh-pages'
  release:
    types: [published]
  workflow_dispatch:

# Restrict to one deploy at a time; cancel in-flight runs if a newer push arrives
concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web site
        run: npm run build:web
        env:
          # Set the repo sub-path so generated URLs are correct on GitHub Pages.
          # Change to '' if the site is served from a custom domain root.
          SITE_BASE_PATH: /tt-vscode-toolkit

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # Only deploy from the main branch; readiness/* branches build but don't deploy
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/gh-pages'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
        id: deployment
