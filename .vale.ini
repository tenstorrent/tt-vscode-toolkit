StylesPath = styles

# Packages to auto-sync (run `vale sync` to fetch)
Packages = Google

MinAlertLevel = suggestion

[formats]
md = markdown

# Apply to all lesson and documentation markdown
[*.md]
BasedOnStyles = Tenstorrent, Google
# Ignore YAML front matter (between --- delimiters at top of file)
TokenIgnores = (?s)\A---.*?---

# Google rules we intentionally override or silence
Google.WordList = NO         # we have our own Tenstorrent terminology rules
Google.Parens = NO           # parenthetical asides are fine in lesson prose
Google.Exclamation = NO      # occasional enthusiasm is OK
Google.FirstPerson = NO      # "I" is rare but not banned
Google.We = NO               # tutorial voice uses "we" and "you" intentionally
Google.Headings = NO         # replaced by Tenstorrent.HeadingH1H2 / HeadingH3Plus
Google.EmDash = NO           # lessons use spaced em-dashes ( — ) by convention
Google.Units = NO            # "45s", "8s" etc are common in code/config contexts
Google.Colons = NO           # colon after incomplete clause is fine in lesson steps
Google.LyAdverb = NO         # "quickly", "easily" used intentionally in tutorials

# Our heading-case rules: H1/H2 = title case, H3+ = sentence case
Tenstorrent.HeadingH1H2 = warning
Tenstorrent.HeadingH3Plus = suggestion
Tenstorrent.Terminology = error
Tenstorrent.ProductNames = error
Tenstorrent.HardwareNames = warning
